<!DOCTYPE html><html lang=en><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><style>body{background:#202124;font-family:Arial,sans-serif;display:flex;justify-content:center;padding:40px;color:#fff}.remote{width:260px;background:#303134;padding:25px;border-radius:30px;box-shadow:0 0 20px rgba(0,0,0,.4)}button{border:0;outline:0;padding:14px;font-size:20px;border-radius:30px;background:#3c4043;color:#e8eaed;cursor:pointer;box-shadow:inset 0 0 3px rgba(0,0,0,.6);transition:.1s}button:active{background:#5f6368}.round{width:55px;height:55px;border-radius:50%}.top-row{display:flex;justify-content:space-between;margin-top:25px}.dpad-container{width:180px;height:180px;margin:0 auto;position:relative}.dpad-btn{position:absolute;width:60px;height:60px;background:#3c4043;border-radius:20px;display:flex;align-items:center;justify-content:center}.dpad-btn:active{background:#5f6368}.up{top:0;left:50%;transform:translateX(-50%)}.down{bottom:0;left:50%;transform:translateX(-50%)}.left{left:0;top:50%;transform:translateY(-50%)}.right{right:0;top:50%;transform:translateY(-50%)}.center-ok{width:75px;height:75px;border-radius:50%;background:#5f6368;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;font-size:26px}.bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:25px}</style><body><div class=remote><div class=dpad-container><button class="dpad-btn up" onclick="s('1007')">▲</button><button class="dpad-btn down" onclick="s('1009')">▼</button><button class="dpad-btn left" onclick="s('1010')">◀</button><button class="dpad-btn right" onclick="s('1012')">▶</button><button class=center-ok onclick="s('1008')">●</button></div><div class=bottom-row><button onclick="s('1011')">⮌</button><button onclick="s('1004')">🔇</button><button onclick="s('1001')">🔊</button><button onclick="s('1003')">🔉</button><button onclick="s('1005')">⚙</button><button onclick="s('1006')">☰</button></div><div class=top-row><button class=round onclick="s('1000')">⏻</button><button class=round onclick="s('1002')">⇆</button></div></div><script>function s(c){fetch('/remote',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:c})})}</script>
